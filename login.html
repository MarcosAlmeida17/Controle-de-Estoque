<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Controle de Estoque</title>
    <script type="module" crossorigin src="./assets/main-WkKDY-kF.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/main-a9ny4mcc.css">
  </head>
  <body class="flex min-h-screen items-center justify-center bg-slate-100 px-4 text-slate-900">
    <main class="w-full max-w-md rounded-3xl border border-slate-200 bg-white p-8 shadow-lg shadow-slate-200/50">
      <div class="flex items-center justify-between gap-4">
        <div>
          <h1 id="auth-title" class="text-3xl font-semibold text-slate-900">Entrar</h1>
          <p id="auth-description" class="mt-2 text-sm text-slate-500">Acesse o sistema de controle de estoque.</p>
        </div>
        <div class="inline-flex rounded-full bg-slate-100 p-1 shadow-sm">
          <button type="button" data-auth-mode="login" class="rounded-full bg-slate-900 px-4 py-2 text-sm font-semibold text-white">Login</button>
          <button type="button" data-auth-mode="register" class="rounded-full px-4 py-2 text-sm font-semibold text-slate-700 hover:bg-slate-200">Cadastre-se</button>
        </div>
      </div>

      <div class="mt-8 space-y-6">
        <form id="login-form" class="space-y-4">
          <label class="block">
            <span class="text-sm font-medium text-slate-700">E-mail</span>
            <input type="email" name="email" required class="mt-2 w-full rounded-2xl border border-slate-300 bg-slate-50 px-4 py-3 text-slate-900 outline-none transition focus:border-sky-500 focus:ring-2 focus:ring-sky-200" placeholder="seu@exemplo.com" />
          </label>
          <label class="block">
            <span class="text-sm font-medium text-slate-700">Senha</span>
            <input type="password" name="password" required class="mt-2 w-full rounded-2xl border border-slate-300 bg-slate-50 px-4 py-3 text-slate-900 outline-none transition focus:border-sky-500 focus:ring-2 focus:ring-sky-200" placeholder="••••••••" />
          </label>
          <button type="submit" class="btn-primary w-full">Entrar</button>
        </form>

        <form id="register-form" class="hidden space-y-4">
          <label class="block">
            <span class="text-sm font-medium text-slate-700">Nome completo</span>
            <input type="text" name="name" required class="mt-2 w-full rounded-2xl border border-slate-300 bg-slate-50 px-4 py-3 text-slate-900 outline-none transition focus:border-sky-500 focus:ring-2 focus:ring-sky-200" placeholder="Seu nome" />
          </label>
          <label class="block">
            <span class="text-sm font-medium text-slate-700">E-mail</span>
            <input type="email" name="email" required class="mt-2 w-full rounded-2xl border border-slate-300 bg-slate-50 px-4 py-3 text-slate-900 outline-none transition focus:border-sky-500 focus:ring-2 focus:ring-sky-200" placeholder="seu@exemplo.com" />
          </label>
          <label class="block">
            <span class="text-sm font-medium text-slate-700">Senha</span>
            <input type="password" name="password" required class="mt-2 w-full rounded-2xl border border-slate-300 bg-slate-50 px-4 py-3 text-slate-900 outline-none transition focus:border-sky-500 focus:ring-2 focus:ring-sky-200" placeholder="••••••••" />
          </label>
          <label class="block">
            <span class="text-sm font-medium text-slate-700">Confirmar senha</span>
            <input type="password" name="confirmPassword" required class="mt-2 w-full rounded-2xl border border-slate-300 bg-slate-50 px-4 py-3 text-slate-900 outline-none transition focus:border-sky-500 focus:ring-2 focus:ring-sky-200" placeholder="••••••••" />
          </label>
          <button type="submit" class="btn-primary w-full">Cadastrar</button>
        </form>
      </div>

      <p class="mt-6 text-center text-sm text-slate-500">
        <span id="footer-login-text">Ainda não tem conta? <button type="button" data-auth-mode="register" class="font-semibold text-sky-600 hover:text-sky-700">Cadastre-se</button></span>
        <span id="footer-register-text" class="hidden">Já tem conta? <button type="button" data-auth-mode="login" class="font-semibold text-sky-600 hover:text-sky-700">Entrar</button></span>
      </p>
    </main>
  </body>
</html>
